<style>
 .search-container {
    position: absolute;
    top: 35%; /* 指で指していたあたりに配置 */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 580px; /* 本物のGoogleに近い幅 */
  }

  /* 入力欄本体のデザイン */
  .search-input {
    width: 100%;
    padding: 12px 20px;
    font-size: 16px;
    border: 1px solid #dfe1e5;
    border-radius: 24px; /* 丸みをつける */
    outline: none; /* クリックした時の青い線を消す */
    background-color: white;
    box-shadow: 0 1px 6px rgba(32,33,36,0.28); /* ふわっと浮いた影 */
    transition: 0.2s;
  }

  /* マウスが乗った時に影を少し強くする（Google風） */
  .search-input:hover, .search-input:focus {
    box-shadow: 0 1px 8px rgba(32,33,36,0.8);
  }
  

 body  {
            background-image: url("https://tsukatte.com/wp-content/uploads/2022/07/waves_BG_01_blue.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            text-align: center;
            margin: 0;
        }

        
        .scratch-image {
            position: absolute;
            top: 0;
            left: 53%;
            transform: translateX(-50%);
            width: 350px; 
        }
    
         

.container {

  display: flex;
  flex-wrap: wrap;       /* 入りきらないときは次の行へ */
  justify-content: center; /* 真ん中に並べる */
  gap: 80px;             /* ロゴ同士の隙間 */
  padding: 300px 100px 50px 100px;   /* 上のポータル画像との距離 */
  max-width: 900px;
  margin: 0 auto;
}

/* すべてのロゴに共通の設定 */
.logo-item {
  display: flex;
  flex-direction: column; /* 画像と文字を縦に並べる */
  align-items: center;
  text-decoration: none;
  color: black;
  font-size: 18px; /* 文字を少し調整 */
  font-weight: bold;
}

/* 画像の設定（ここを一箇所いじるだけで全部のサイズが変わる！） */
/* 画像の設定 */
.logo-item img {
  width: 120px; 
  height: 120px;      /* 高さを固定する */
  object-fit: contain; /* 枠の中で画像が切れないように収める */
  transition: transform 0.3s;
  border-radius: 18px;
  background-color: rgba(255,255,255,0.5); /* 任意：背景を少し白くするとサイズ感が揃って見えます */
}

.logo-item:hover img {
  transform: scale(1.1);
}
</style>
